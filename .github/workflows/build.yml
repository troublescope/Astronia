name: Android Build & Release

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      HAS_KEYSTORE: ${{ secrets.KEYSTORE != '' }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode Keystore
      env:
        ENCODED_STRING: ${{ secrets.KEYSTORE }}
      run: |
        if [ ! -z "$ENCODED_STRING" ]; then
          echo "$ENCODED_STRING" | base64 -di > release.jks
          echo "storeFile=release.jks" > keystore.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties
        fi

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Build Release APK
      if: github.event_name != 'pull_request' && env.HAS_KEYSTORE == 'true'
      run: ./gradlew assembleRelease

    - name: Upload Debug APKs
      uses: actions/upload-artifact@v4
      with:
        name: Astronia-Debug-APKs
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Release APKs
      if: github.event_name != 'pull_request' && env.HAS_KEYSTORE == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: Astronia-Release-APKs
        path: app/build/outputs/apk/release/*.apk

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          app/build/outputs/apk/release/*.apk
          app/build/outputs/apk/debug/*.apk
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
